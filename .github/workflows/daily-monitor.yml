name: Daily Monitor

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 España
  workflow_dispatch:

concurrency:
  group: daily-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape RSS feeds
        run: python scripts/scrape_rss.py

      - name: Run AI Share of Voice
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/ai_share_of_voice.py

      - name: Build web data
        run: python scripts/build_web_data.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bmw-monitor/public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily monitor update [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep 10
            done
          fi

      - name: Trigger Vercel deploy
        if: success()
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_MONITOR }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK" -o /dev/null -w "HTTP %{http_code}\n"
          fi

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Daily monitor failed'
            const body = `Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'monitor-failure', state: 'open'
            })
            if (issues.data.length) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issues.data[0].number, body })
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['monitor-failure'] })
            }
